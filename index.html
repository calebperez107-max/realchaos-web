<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RealChaos Network</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 30px;
      font-size: 2em;
      color: #4caf50;
    }

    .card {
      background: #111;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
    }

    button {
      padding: 10px;
      background: #4caf50;
      border: none;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>⚡ RealChaos Network ⚡</header>

<div class="card">
  <h2>🎮 Estado</h2>
  <p id="status">Cargando...</p>
  <p id="players"></p>
</div>

<div class="card">
  <h2>🌐 IP</h2>
  <p>realchaos.falix.gg</p>
  <button onclick="copyIP()">Copiar IP</button>
</div>

<div class="card">
  <h2>💬 Discord</h2>
  <button onclick="discord()">Unirse</button>
</div>

<script>
function copyIP(){
  navigator.clipboard.writeText("realchaos.falix.gg");
  alert("IP copiada");
}

function discord(){
  window.open("https://discord.gg/VE8Bh4XbM");
}

fetch("https://api.mcsrvstat.us/2/realchaos.falix.gg")
.then(res=>res.json())
.then(data=>{
 document.getElementById("status").innerText=data.online?"🟢 Online":"🔴 Offline";
 if(data.online){
  document.getElementById("players").innerText="Jugadores: "+data.players.online+"/"+data.players.max;
 }
});
</script>

</body>
</html>
